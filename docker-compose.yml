services:
  auth-manager:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      CODEX_CLI_BIN: ${CODEX_CLI_BIN:-codex}
      CODEX_SWITCH_BIN: ${CODEX_SWITCH_BIN:-cxs}
      CODEX_AUTH_PATH: ${CODEX_AUTH_PATH:-/root/.codex/auth.json}
      CALLBACK_STORE_DIR: ${CALLBACK_STORE_DIR:-/root/.codex-switch/callbacks}
      CODEX_PROFILES_DIR: ${CODEX_PROFILES_DIR:-/root/.codex-switch/profiles}
      USAGE_DB_PATH: ${USAGE_DB_PATH:-/root/.codex-switch/auth-manager.sqlite3}
      LOGIN_SESSION_TTL_SECONDS: ${LOGIN_SESSION_TTL_SECONDS:-600}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      RATE_LIMIT_PROBE_URL: ${RATE_LIMIT_PROBE_URL:-https://api.openai.com/v1/models}
      OPENAI_ORGANIZATION: ${OPENAI_ORGANIZATION:-}
      OPENAI_PROJECT: ${OPENAI_PROJECT:-}
      OPENAI_TOKEN_URL: ${OPENAI_TOKEN_URL:-}
      OPENAI_CLIENT_ID: ${OPENAI_CLIENT_ID:-}
      OPENAI_CLIENT_SECRET: ${OPENAI_CLIENT_SECRET:-}
      OPENAI_REDIRECT_URI: ${OPENAI_REDIRECT_URI:-http://localhost:1455/auth/callback}
    volumes:
      - codex_auth:/root/.codex
      - codex_switch:/root/.codex-switch
    restart: unless-stopped

volumes:
  codex_auth:
  codex_switch:
