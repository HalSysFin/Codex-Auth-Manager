<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Auth Relay</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f6fb;
        color: #1a1f2b;
      }
      .panel {
        max-width: 460px;
        background: #ffffff;
        border: 1px solid #dde5f1;
        border-radius: 12px;
        padding: 20px;
      }
      h1 { margin-top: 0; font-size: 20px; }
      p { line-height: 1.5; }

  <body>
    <div class="panel">
      <h1>Login completed</h1>
      <p>The OAuth callback was relayed to auth-manager.</p>
      <p>You can close this tab.</p>
    </div>
  </body>
</html>
