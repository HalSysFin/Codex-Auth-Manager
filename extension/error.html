<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Auth Relay Error</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff5f5;
        color: #3a1111;
      }
      .panel {
        max-width: 520px;
        background: #ffffff;
        border: 1px solid #f0c7c7;
        border-radius: 12px;
        padding: 20px;
      }
      h1 { margin-top: 0; font-size: 20px; }
      code {
        display: block;
        white-space: pre-wrap;
        margin-top: 8px;
        background: #fff1f1;
        border: 1px solid #f3dede;
        border-radius: 8px;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Relay failed</h1>
      <p>The localhost callback could not be relayed to auth-manager.</p>
      <code id="reason">Unknown error</code>
    </div>
    <script>
      const hash = new URLSearchParams(location.hash.replace(/^#/, ""));
      const reason = hash.get("reason");
      if (reason) {
        document.getElementById("reason").textContent = decodeURIComponent(reason);
      }
    </script>
  </body>
</html>
